<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetWork Manager - مراقب استهلاك الإنترنت</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <header class="header">
            <div class="header-content">
                <h1>🌐 NetWork Manager</h1>
                <p>مراقب استهلاك الإنترنت للأجهزة المتصلة</p>
            </div>
            <div class="status-indicator">
                <span id="status" class="status-dot active"></span>
                <span id="status-text">نشط</span>
            </div>
        </header>

        <!-- شريط الإحصائيات العامة -->
        <section class="stats-bar">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <span class="stat-label">إجمالي الأجهزة</span>
                    <span class="stat-value" id="total-devices">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⬇️</div>
                <div class="stat-info">
                    <span class="stat-label">التحميل</span>
                    <span class="stat-value" id="total-download">0 B</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⬆️</div>
                <div class="stat-info">
                    <span class="stat-label">الرفع</span>
                    <span class="stat-value" id="total-upload">0 B</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-info">
                    <span class="stat-label">الإجمالي</span>
                    <span class="stat-value" id="total-usage">0 B</span>
                </div>
            </div>
        </section>

        <!-- التحكم والتصفية -->
        <section class="controls">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="ابحث عن جهاز...">
            </div>
            <div class="filter-buttons">
                <button id="btn-all" class="filter-btn active">الكل</button>
                <button id="btn-alert" class="filter-btn">الأجهزة مع تنبيهات</button>
                <button id="btn-refresh" class="filter-btn">🔄 تحديث</button>
            </div>
        </section>

        <!-- جدول الأجهزة -->
        <section class="devices-section">
            <table class="devices-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>اسم الجهاز</th>
                        <th>عنوان IP</th>
                        <th>عنوان MAC</th>
                        <th>التحميل</th>
                        <th>الرفع</th>
                        <th>الإجمالي</th>
                        <th>الحد الأقصى</th>
                        <th>الاستخدام %</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="devices-tbody">
                    <!-- سيتم ملء البيانات هنا -->
                </tbody>
            </table>
        </section>

        <!-- Modal لتعيين الحد -->
        <div id="limit-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>تعيين حد الاستهلاك</h2>
                <div class="modal-body">
                    <div class="form-group">
                        <label>اسم الجهاز:</label>
                        <input type="text" id="device-name" disabled>
                    </div>
                    <div class="form-group">
                        <label>عنوان IP:</label>
                        <input type="text" id="device-ip" disabled>
                    </div>
                    <div class="form-group">
                        <label>الحد الأقصى (بالميجابايت):</label>
                        <input type="number" id="limit-value" placeholder="مثال: 1000" min="1">
                    </div>
                    <div class="form-group">
                        <label>نوع الحد:</label>
                        <select id="limit-type">
                            <option value="daily">يومي</option>
                            <option value="monthly">شهري</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="btn-save-limit" class="btn-primary">حفظ</button>
                    <button id="btn-cancel-limit" class="btn-secondary">إلغاء</button>
                </div>
            </div>
        </div>

        <!-- تنبيهات -->
        <div id="notification" class="notification"></div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
